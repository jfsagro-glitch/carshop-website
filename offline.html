<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1220">
    <title>EXPO MIR — офлайн</title>
    <link rel="manifest" href="site.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b1220;
            color: #f8fafc;
        }
        main {
            width: min(520px, 100%);
            text-align: center;
        }
        img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            margin-bottom: 24px;
        }
        h1 {
            margin: 0 0 12px;
            font-size: clamp(28px, 8vw, 44px);
            line-height: 1.05;
            letter-spacing: 0;
        }
        p {
            margin: 0 0 24px;
            color: #cbd5e1;
            line-height: 1.6;
        }
        a, button {
            display: inline-flex;
            min-height: 44px;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 8px;
            padding: 0 18px;
            background: #d4af37;
            color: #111827;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <img src="images/android-chrome-192x192.png" alt="EXPO MIR">
        <h1>Нет подключения</h1>
        <p>Основные страницы EXPO MIR сохраняются на устройстве. Проверьте интернет и попробуйте открыть каталог ещё раз.</p>
        <button type="button" onclick="location.reload()">Повторить</button>
    </main>
</body>
</html>
