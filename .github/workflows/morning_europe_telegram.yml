name: Morning Europe offers to Telegram

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/morning_europe_telegram.yml'
      - 'tools/post_europe_morning_telegram.py'
  schedule:
    # 09:00 Europe/Moscow = 06:00 UTC. Extra attempts cover GitHub schedule delays.
    - cron: '0 6 * * *'
    - cron: '15 6 * * *'
    - cron: '30 6 * * *'
    - cron: '45 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Только проверить подборку, не отправлять в Telegram'
        type: boolean
        default: true
      test_send:
        description: 'Отправить тестовый пост без записи в историю'
        type: boolean
        default: false

concurrency:
  group: morning-europe-telegram
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_EUROPE_CHANNEL_ID: ${{ secrets.TELEGRAM_EUROPE_CHANNEL_ID }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_PUBLIC_CHANNEL_ID: ${{ secrets.TELEGRAM_PUBLIC_CHANNEL_ID }}

    steps:
      - name: Checkout latest catalog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pillow

      - name: Check publish window
        id: publish_window
        run: |
          SHOULD_PUBLISH=false
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SHOULD_PUBLISH=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            SHOULD_PUBLISH=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test_send }}" = "true" ]; then
            SHOULD_PUBLISH=true
            TEST_SEND=true
          elif [ "${{ github.event_name }}" = "push" ]; then
            if [[ "${{ github.event.head_commit.message }}" == *"[telegram-test]"* ]]; then
              SHOULD_PUBLISH=true
              TEST_SEND=true
            fi
            HOUR="$(date -u +%H)"
            if [ "$HOUR" = "06" ] || [ "$HOUR" = "07" ]; then
              SHOULD_PUBLISH=true
            fi
          fi
          echo "publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "test=$TEST_SEND" >> "$GITHUB_OUTPUT"
          echo "publish=$SHOULD_PUBLISH"
          echo "test=$TEST_SEND"

      - name: Validate and publish one Telegram offer
        if: ${{ steps.publish_window.outputs.publish == 'true' }}
        run: |
          if [ "${{ steps.publish_window.outputs.test }}" = "true" ]; then
            python tools/post_europe_morning_telegram.py --test
          else
            python tools/post_europe_morning_telegram.py
          fi

      - name: Dry-run one Telegram offer
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        run: python tools/post_europe_morning_telegram.py --dry-run

      - name: Save publication history
        if: ${{ steps.publish_window.outputs.publish == 'true' && steps.publish_window.outputs.test != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cars_europe_new.json data/telegram_europe_history.json data/home_featured_europe.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "auto: record daily Europe Telegram offer"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          exit 1
