name: Auto-sync car catalogs

on:
  schedule:
    # 4 раза в день: 08:00, 12:00, 16:00, 20:00 Бишкек
    - cron: '0 2,6,10,14 * * *'
  workflow_dispatch:       # ручной запуск из GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      MYAUTO_PROXY: ${{ secrets.MYAUTO_PROXY }}
      MOBILEDE_PROXY: ${{ secrets.MOBILEDE_PROXY }}
      PARSER_PROXY: ${{ secrets.PARSER_PROXY }}
    permissions:
      contents: write      # нужно для git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Sync Georgia stock from myauto.ge
        run: |
          python car_parser.py \
            --source myauto \
            --max 300 \
            --min-age 3 \
            --max-age 5 \
            --max-power-hp 160 \
            --delay 1.5 \
            --sync-stock \
            --stock-file cars_georgia_stock.json \
            --quiet

      - name: Sync Europe catalog from mobile.de
        continue-on-error: true
        run: |
          python car_parser.py \
            --source mobilede \
            --max 150 \
            --min-age 3 \
            --max-age 5 \
            --max-power-hp 160 \
            --min-records 10 \
            --delay 2 \
            --out cars_europe_new.json \
            --fail-empty \
            --quiet

      - name: Validate public catalogs
        run: python car_parser.py --validate-catalogs

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet cars_georgia_stock.json cars_europe_new.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cars_georgia_stock.json cars_europe_new.json
          git commit -m "auto: sync car catalogs [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push
