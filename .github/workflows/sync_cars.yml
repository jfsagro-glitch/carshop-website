name: Auto-sync car catalogs

on:
  schedule:
    # 4 раза в день: 08:00, 12:00, 16:00, 20:00 Бишкек (UTC+6)
    - cron: '0 2,6,10,14 * * *'
  workflow_dispatch:
    inputs:
      min_age:
        description: 'Минимальный возраст авто в годах'
        required: true
        default: '3'
      max_age:
        description: 'Максимальный возраст авто в годах'
        required: true
        default: '5'
      max_power_hp:
        description: 'Максимальная мощность, л.с.'
        required: true
        default: '160'
      georgia_max:
        description: 'Сколько объявлений myauto.ge проверить'
        required: true
        default: '300'
      europe_max:
        description: 'Сколько объявлений AutoScout24 проверить'
        required: true
        default: '500'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      MYAUTO_PROXY: ${{ secrets.MYAUTO_PROXY }}
      MOBILEDE_PROXY: ${{ secrets.MOBILEDE_PROXY }}
      AUTOSCOUT24_PROXY: ${{ secrets.AUTOSCOUT24_PROXY }}
      PARSER_PROXY: ${{ secrets.PARSER_PROXY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_EUROPE_CHANNEL_ID: ${{ secrets.TELEGRAM_EUROPE_CHANNEL_ID }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MIN_AGE: ${{ github.event.inputs.min_age || '3' }}
      MAX_AGE: ${{ github.event.inputs.max_age || '5' }}
      MAX_POWER_HP: ${{ github.event.inputs.max_power_hp || '160' }}
      GEORGIA_MAX: ${{ github.event.inputs.georgia_max || '1200' }}
      EUROPE_MAX: ${{ github.event.inputs.europe_max || '240' }}
    permissions:
      contents: write      # нужно для git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pillow

      - name: Backup publish Europe offer to Telegram
        run: |
          HOUR="$(date -u +%H)"
          if [ "$HOUR" -lt "06" ]; then
            echo "Before the morning Telegram window, current UTC hour is $HOUR"
            exit 0
          fi
          python tools/post_europe_morning_telegram.py

      - name: Save Europe Telegram history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/telegram_europe_history.json data/home_featured_europe.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "auto: record daily Europe Telegram offer"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 5))
          done
          exit 1

      - name: Show parser settings
        run: |
          echo "Parser filters: age ${MIN_AGE}-${MAX_AGE} by current month, max power ${MAX_POWER_HP} hp / 115 kW"
          echo "Georgia max: ${GEORGIA_MAX}"
          echo "Europe max: ${EUROPE_MAX}"
          echo "AUTOSCOUT24_PROXY configured: $([[ -n "$AUTOSCOUT24_PROXY" ]] && echo yes || echo no)"

      - name: Sync Georgia stock from myauto.ge
        run: |
          python car_parser.py \
            --source myauto \
            --max "$GEORGIA_MAX" \
            --min-age "$MIN_AGE" \
            --max-age "$MAX_AGE" \
            --max-power-hp "$MAX_POWER_HP" \
            --delay 1.5 \
            --sync-stock \
            --stock-file cars_georgia_stock.json \
            --quiet

      - name: Report Georgia stock
        run: |
          COUNT=$(python -c "import json; data=json.load(open('cars_georgia_stock.json')); print(len(data))")
          echo "Georgia stock after strict photo/year/power filters: $COUNT cars"

      - name: Recalculate Georgia turnkey prices by CBR rates
        run: node tools/update_georgia_turnkey_prices.mjs

      - name: Sync Europe catalog from AutoScout24
        run: |
          python car_parser.py \
            --source autoscout24 \
            --max "$EUROPE_MAX" \
            --unique-models 500 \
            --max-pages 300 \
            --min-age "$MIN_AGE" \
            --max-age "$MAX_AGE" \
            --max-power-hp "$MAX_POWER_HP" \
            --min-records 50 \
            --delay 1 \
            --out cars_europe_new.json \
            --quiet || \
          python car_parser.py \
            --source mobilede \
            --max "$EUROPE_MAX" \
            --min-age "$MIN_AGE" \
            --max-age "$MAX_AGE" \
            --max-power-hp "$MAX_POWER_HP" \
            --min-records 50 \
            --delay 2 \
            --out cars_europe_new.json \
            --quiet || true

      - name: Supplement Europe catalog to 444+ cars
        run: |
          COUNT=$(python -c "import json; data=json.load(open('cars_europe_new.json')); print(len(data))" 2>/dev/null || echo "0")
          echo "Europe catalog after parse: $COUNT cars"
          if [ "$COUNT" -lt 444 ]; then
            echo "Supplementing Europe catalog ($COUNT < 444)..."
            python generate_europe_data.py
            COUNT2=$(python -c "import json; data=json.load(open('cars_europe_new.json')); print(len(data))")
            echo "Europe catalog after supplement: $COUNT2 cars"
          fi

      - name: Remove unavailable Europe listings
        run: |
          python tools/prune_unavailable_europe.py --input cars_europe_new.json --workers 32 --timeout 8

      - name: Enrich AutoScout24 engine displacement from detail pages
        run: |
          python tools/enrich_autoscout_engine_displacement.py \
            --input cars_europe_new.json \
            --workers 12 \
            --timeout 15 \
            --checkpoint-every 250 \
            --requests-per-second 6 \
            --retries 5

      - name: Recalculate Europe turnkey prices by CBR rates
        run: node tools/update_europe_turnkey_prices.mjs

      - name: Build homepage Europe offers
        run: node tools/build_home_europe_offers.mjs --exclude-history

      - name: Sync Avtostok63 premium stock
        run: python tools/fetch_carexpo_premium.py

      - name: Validate public catalogs
        run: python car_parser.py --validate-catalogs

      - name: Validate SEO metadata and sitemap
        run: |
          python generate_sitemap.py
          python tools/check_seo.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet cars_georgia_stock.json cars_europe_new.json data/avtostok63_premium.json data/home_featured_europe.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cars_georgia_stock.json cars_europe_new.json data/avtostok63_premium.json data/home_featured_europe.json
          git commit -m "auto: sync car catalogs [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Sync Korea stock from encar.com
        run: |
          python car_parser.py \
            --source encar \
            --max 150 \
            --delay 1.5 \
            --out cars_korea_stock.json \
            --quiet || true

      - name: Supplement Korea stock to 444+ cars
        run: |
          COUNT=$(python -c "import json; data=json.load(open('cars_korea_stock.json')); print(len(data))" 2>/dev/null || echo "0")
          echo "Korea stock after parse: $COUNT cars"
          if [ "$COUNT" -lt 444 ]; then
            echo "Supplementing Korea stock ($COUNT < 444)..."
            python generate_korea_data.py
            COUNT2=$(python -c "import json; data=json.load(open('cars_korea_stock.json')); print(len(data))")
            echo "Korea stock after supplement: $COUNT2 cars"
          fi

      - name: Sync all catalogs to Supabase
        run: python import_to_supabase.py || true

      - name: Cleanup stale cars in Supabase
        run: python cleanup_cars.py

      - name: Generate sitemap.xml
        run: python generate_sitemap.py

      - name: Commit Korea + sitemap if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A cars_korea_stock.json sitemap.xml 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: korea stock + sitemap [$(date +'%Y-%m-%d %H:%M UTC')]"
          git push || true

      - name: Notify IndexNow about catalog updates
        continue-on-error: true
        run: node tools/submit_indexnow.mjs

      - name: Import parts catalog to Supabase
        run: python parts_parser.py --input parts_catalog.csv --quiet || true

      - name: Notify car catalog updates to Telegram
        run: python notify_cars.py --hours 5 --only-new || true

      - name: Notify new leads to Telegram
        run: python notify_leads.py
